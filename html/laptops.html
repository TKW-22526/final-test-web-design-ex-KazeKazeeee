<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="PhongTech - Cửa hàng thiết bị điện tử cho học tập, làm việc và giải trí"
    />
    <title>Laptop | PhongTech</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-category="laptops">
    <div id="site-header"></div>
    <main>
      <section class="page-hero">
        <div class="container">
          <span class="section-kicker">PhongTech Store</span>
          <h1 id="categoryTitle" class="fw-bold mt-2"></h1>
          <p id="categorySubtitle" class="text-secondary mb-0"></p>
        </div>
      </section>
      <section class="section-pad">
        <div class="container">
          <div class="filter-panel mb-4">
            <div class="row g-3 align-items-end">
              <div class="col-md-4">
                <label class="form-label fw-semibold">Tìm sản phẩm</label>
                <input
                  id="productSearch"
                  class="form-control"
                  placeholder="Nhập tên hoặc thông số..."
                />
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label fw-semibold">Thương hiệu</label>
                <select id="brandFilter" class="form-select">
                  <option value="">Tất cả</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label fw-semibold">Khoảng giá</label>
                <select id="priceFilter" class="form-select">
                  <option value="0">Tất cả</option>
                  <option value="1000000">Dưới 1 triệu</option>
                  <option value="5000000">Dưới 5 triệu</option>
                  <option value="10000000">Dưới 10 triệu</option>
                  <option value="20000000">Dưới 20 triệu</option>
                  <option value="30000000">Dưới 30 triệu</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <label class="form-label fw-semibold">Sắp xếp</label>
                <select id="sortFilter" class="form-select">
                  <option value="featured">Mặc định</option>
                  <option value="price-asc">Giá tăng dần</option>
                  <option value="price-desc">Giá giảm dần</option>
                  <option value="rating">Đánh giá cao</option>
                  <option value="name">Tên A–Z</option>
                </select>
              </div>
              <div class="col-6 col-md-2">
                <button
                  id="clearFilters"
                  class="btn btn-outline-secondary w-100"
                >
                  <i class="bi bi-arrow-counterclockwise me-1"></i>
                  Xóa lọc
                </button>
              </div>
            </div>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <strong id="resultCount"></strong>
            <span class="small text-secondary">Giá tham khảo</span>
          </div>
          <div id="productGrid" class="row g-4"></div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/category.js"></script>
  </body>
</html>
