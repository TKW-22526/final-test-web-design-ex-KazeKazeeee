<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="PhongTech - Cửa hàng thiết bị điện tử cho học tập, làm việc và giải trí"
    />
    <title>Đăng nhập | PhongTech</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="section-pad bg-light">
      <div class="container">
        <div id="userStatus" class="mb-3"></div>
        <div class="auth-shell">
          <div class="row g-0">
            <div
              class="col-lg-5 auth-side d-flex flex-column justify-content-center"
            >
              <span class="section-kicker text-white-50">Tài khoản demo</span>
              <h1 class="fw-bold mt-2">Chào mừng đến PhongTech</h1>
              <p class="text-white-50">
                Tính năng đăng nhập và đăng ký chỉ là mô phỏng phía trình duyệt,
                không gửi dữ liệu lên máy chủ.
              </p>
              <ul class="list-unstyled">
                <li class="mb-2">
                  <i class="bi bi-check-circle me-2"></i>
                  Lưu tài khoản bằng localStorage
                </li>
                <li class="mb-2">
                  <i class="bi bi-check-circle me-2"></i>
                  Không dùng cơ sở dữ liệu
                </li>
                <li>
                  <i class="bi bi-check-circle me-2"></i>
                  Dễ giải thích khi báo cáo
                </li>
              </ul>
            </div>
            <div class="col-lg-7 p-4 p-md-5">
              <ul class="nav nav-pills mb-4" role="tablist">
                <li class="nav-item">
                  <button
                    class="nav-link active"
                    data-bs-toggle="pill"
                    data-bs-target="#loginTab"
                  >
                    Đăng nhập
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link"
                    data-bs-toggle="pill"
                    data-bs-target="#registerTab"
                  >
                    Đăng ký
                  </button>
                </li>
              </ul>
              <div class="tab-content">
                <div id="loginTab" class="tab-pane fade show active">
                  <form id="loginForm">
                    <div class="mb-3">
                      <label class="form-label">Email</label>
                      <input
                        name="loginEmail"
                        type="email"
                        class="form-control form-control-lg"
                        required
                      />
                    </div>
                    <div class="mb-4">
                      <label class="form-label">Mật khẩu</label>
                      <input
                        name="loginPassword"
                        type="password"
                        minlength="6"
                        class="form-control form-control-lg"
                        required
                      />
                    </div>
                    <button class="btn btn-brand btn-lg w-100">
                      Đăng nhập mô phỏng
                    </button>
                  </form>
                </div>
                <div id="registerTab" class="tab-pane fade">
                  <form id="registerForm">
                    <div class="mb-3">
                      <label class="form-label">Họ và tên</label>
                      <input name="name" class="form-control" required />
                    </div>
                    <div class="mb-3">
                      <label class="form-label">Email</label>
                      <input
                        name="email"
                        type="email"
                        class="form-control"
                        required
                      />
                    </div>
                    <div class="row g-3 mb-4">
                      <div class="col-md-6">
                        <label class="form-label">Mật khẩu</label>
                        <input
                          name="password"
                          type="password"
                          minlength="6"
                          class="form-control"
                          required
                        />
                      </div>
                      <div class="col-md-6">
                        <label class="form-label">Nhập lại mật khẩu</label>
                        <input
                          name="confirmPassword"
                          type="password"
                          minlength="6"
                          class="form-control"
                          required
                        />
                      </div>
                    </div>
                    <button class="btn btn-brand btn-lg w-100">
                      Tạo tài khoản mô phỏng
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
