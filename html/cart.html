<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="PhongTech - Cửa hàng thiết bị điện tử cho học tập, làm việc và giải trí"
    />
    <title>Giỏ hàng | PhongTech</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main>
      <section class="page-hero">
        <div class="container">
          <span class="section-kicker">Mua sắm</span>
          <h1 class="fw-bold mt-2">Giỏ hàng của bạn</h1>
          <p class="text-secondary mb-0">
            Dữ liệu giỏ hàng được lưu trên trình duyệt bằng localStorage.
          </p>
        </div>
      </section>
      <section class="section-pad">
        <div class="container">
          <div class="cart-layout">
            <div id="cartItems"></div>
            <aside id="cartSummary" class="summary-card">
              <h2 class="h5 fw-bold mb-4">Tóm tắt đơn hàng</h2>
              <div class="d-flex justify-content-between mb-3">
                <span>Tạm tính</span>
                <strong id="subtotal"></strong>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span>Phí giao hàng</span>
                <strong id="shipping"></strong>
              </div>
              <hr />
              <div class="d-flex justify-content-between fs-5 mb-4">
                <span>Tổng cộng</span>
                <strong id="total" class="text-danger"></strong>
              </div>
              <button
                class="btn btn-brand btn-lg w-100"
                data-bs-toggle="modal"
                data-bs-target="#checkoutModal"
              >
                Đặt hàng mô phỏng
              </button>
              <p class="small text-secondary text-center mt-3 mb-0">
                Không có thanh toán hoặc giao dịch thật.
              </p>
            </aside>
          </div>
        </div>
      </section>
    </main>
    <div class="modal fade" id="checkoutModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
          <form id="checkoutForm" novalidate>
            <div class="modal-header">
              <h2 class="modal-title fs-5">Thông tin đặt hàng mô phỏng</h2>
              <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Họ và tên</label>
                  <input class="form-control" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Số điện thoại</label>
                  <input class="form-control" pattern="[0-9]{9,11}" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Địa chỉ</label>
                  <input class="form-control" required />
                </div>
                <div class="col-12">
                  <label class="form-label">Ghi chú</label>
                  <textarea class="form-control" rows="3"></textarea>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Hủy
              </button>
              <button class="btn btn-brand" type="submit">
                Xác nhận đơn demo
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div id="site-footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/cart.js"></script>
  </body>
</html>
